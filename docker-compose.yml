version: "3.8"

services:
  db:
    image: mysql:8
    container_name: stoktu-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=stoktu
      - MYSQL_USER=stoktu_user
      - MYSQL_PASSWORD=secret
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    container_name: stoktu-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=stoktu
      - DB_USERNAME=stoktu_user
      - DB_PASSWORD=secret
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - ./backend:/var/www/html

  frontend:
    build: ./frontend
    container_name: stoktu-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    command: >
      sh -c "npm run dev -- --host"
    volumes:
      - ./frontend:/app

volumes:
  dbdata:
